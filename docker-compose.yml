version: '3.8'

services:
  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-linkdbot:5432/${POSTGRES_DB}
    networks:
      - n8n-docker_default

networks:
  n8n-docker_default:
    external: true
