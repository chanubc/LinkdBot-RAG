<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <defs>
    <style>
      .box { fill: #fff; stroke: #374151; stroke-width: 2; }
      .input-box { fill: #dbeafe; stroke: #0284c7; stroke-width: 2; }
      .process-box { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .output-box { fill: #fed7aa; stroke: #f97316; stroke-width: 2; }
      .text { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #1f2937; }
      .label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #666; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Row 1: Input -->
  <rect x="20" y="20" width="120" height="60" class="input-box" rx="5"/>
  <text x="80" y="55" text-anchor="middle" class="text">👤 Telegram</text>
  <text x="80" y="70" text-anchor="middle" class="label">User</text>

  <path d="M 140 50 L 180 50" class="arrow"/>

  <rect x="180" y="20" width="140" height="60" class="input-box" rx="5"/>
  <text x="250" y="55" text-anchor="middle" class="text">📱 Telegram API</text>

  <path d="M 320 50 L 360 50" class="arrow"/>

  <rect x="360" y="20" width="160" height="60" class="input-box" rx="5"/>
  <text x="440" y="55" text-anchor="middle" class="text">🔗 POST /webhook</text>

  <!-- Row 2: Handler & Router -->
  <path d="M 440 80 L 440 120" class="arrow"/>

  <rect x="360" y="120" width="160" height="60" class="process-box" rx="5"/>
  <text x="440" y="150" text-anchor="middle" class="text">WebhookHandler</text>
  <text x="440" y="165" text-anchor="middle" class="label">+ TelegramWebhookHandler</text>

  <path d="M 440 180 L 440 220" class="arrow"/>

  <rect x="360" y="220" width="160" height="60" class="process-box" rx="5"/>
  <text x="440" y="250" text-anchor="middle" class="text">MessageRouter</text>
  <text x="440" y="265" text-anchor="middle" class="label">+ IntentClassifier</text>

  <!-- Row 3: Branch (3개 흐름) -->
  <path d="M 360 250 L 280 250 L 280 320" class="arrow"/>
  <path d="M 440 280 L 440 320" class="arrow"/>
  <path d="M 520 250 L 600 250 L 600 320" class="arrow"/>

  <!-- Save Link -->
  <rect x="200" y="320" width="160" height="60" class="process-box" rx="5"/>
  <text x="280" y="350" text-anchor="middle" class="text">SaveLinkUseCase</text>
  <text x="280" y="365" text-anchor="middle" class="label">+ Scraper + OpenAI</text>

  <!-- Search -->
  <rect x="360" y="320" width="160" height="60" class="process-box" rx="5"/>
  <text x="440" y="350" text-anchor="middle" class="text">SearchUseCase</text>
  <text x="440" y="365" text-anchor="middle" class="label">+ HybridRetriever</text>

  <!-- Ask (Agent) -->
  <rect x="520" y="320" width="160" height="60" class="process-box" rx="5"/>
  <text x="600" y="350" text-anchor="middle" class="text">KnowledgeAgent</text>
  <text x="600" y="365" text-anchor="middle" class="label">+ Function Calling</text>

  <!-- Row 4: Convergence to DB -->
  <path d="M 280 380 L 280 420 L 440 420" class="arrow"/>
  <path d="M 440 380 L 440 420" class="arrow"/>
  <path d="M 600 380 L 600 420 L 440 420" class="arrow"/>

  <!-- DB -->
  <rect x="360" y="420" width="160" height="60" class="output-box" rx="5"/>
  <text x="440" y="450" text-anchor="middle" class="text">🗄️ PostgreSQL</text>
  <text x="440" y="465" text-anchor="middle" class="label">+ pgvector Storage</text>

  <!-- Row 5: External Systems -->
  <path d="M 280 320 L 200 320 L 200 500" class="arrow" stroke-dasharray="5,5"/>
  <path d="M 600 320 L 680 320 L 680 500" class="arrow" stroke-dasharray="5,5"/>

  <rect x="120" y="500" width="160" height="60" class="output-box" rx="5"/>
  <text x="200" y="530" text-anchor="middle" class="text">🧪 Jina Reader</text>
  <text x="200" y="545" text-anchor="middle" class="label">Scraper</text>

  <rect x="600" y="500" width="160" height="60" class="output-box" rx="5"/>
  <text x="680" y="530" text-anchor="middle" class="text">🤖 OpenAI API</text>
  <text x="680" y="545" text-anchor="middle" class="label">Embed + Analyze</text>

  <!-- Row 6: Response -->
  <path d="M 440 480 L 440 600" class="arrow"/>

  <rect x="360" y="600" width="160" height="60" class="output-box" rx="5"/>
  <text x="440" y="630" text-anchor="middle" class="text">💬 Telegram</text>
  <text x="440" y="645" text-anchor="middle" class="label">Response Message</text>

  <!-- 범례 -->
  <text x="20" y="710" font-size="11" fill="#475569">
    🔵 Input (Telegram) | 🟢 Process (UseCase) | 🟠 Output (DB/External)
  </text>
</svg>
