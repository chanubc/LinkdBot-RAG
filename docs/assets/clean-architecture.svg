<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="600" height="600" fill="#f9fafb"/>

  <!-- 가장 바깥쪽: Presentation (빨강) -->
  <circle cx="300" cy="300" r="280" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="300" r="280" fill="#fecaca" opacity="0.1"/>

  <!-- Infrastructure (주황) -->
  <circle cx="300" cy="300" r="210" fill="none" stroke="#f97316" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="300" r="210" fill="#fed7aa" opacity="0.1"/>

  <!-- Application (초록) -->
  <circle cx="300" cy="300" r="140" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="300" r="140" fill="#bbf7d0" opacity="0.1"/>

  <!-- Domain (파랑 - 가장 안쪽) -->
  <circle cx="300" cy="300" r="70" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="300" r="70" fill="#bfdbfe" opacity="0.1"/>

  <!-- 텍스트 라벨 -->
  <!-- Presentation -->
  <text x="300" y="560" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">
    📱 Presentation
  </text>
  <text x="300" y="580" text-anchor="middle" font-size="12" fill="#7f1d1d">
    FastAPI Routers · DI
  </text>

  <!-- Infrastructure -->
  <text x="480" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">
    🔧 Infrastructure
  </text>
  <text x="480" y="328" text-anchor="middle" font-size="11" fill="#b45309">
    Adapters · LLM · RAG · External
  </text>

  <!-- Application -->
  <text x="300" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">
    ⚙️ Application
  </text>
  <text x="300" y="298" text-anchor="middle" font-size="11" fill="#166534">
    UseCases · Services · Ports
  </text>

  <!-- Domain -->
  <text x="300" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">
    🧩 Domain
  </text>
  <text x="300" y="323" text-anchor="middle" font-size="10" fill="#1e3a8a">
    Pure Logic
  </text>

  <!-- 의존성 화살표 (안쪽→바깥쪽) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <path d="M 300 70 L 300 140" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 300 140 L 300 210" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 300 210 L 300 280" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>

  <!-- 범례 -->
  <text x="20" y="20" font-size="12" font-weight="bold" fill="#1f2937">의존성 방향: 안쪽 ← 바깥쪽</text>
  <text x="20" y="40" font-size="11" fill="#475569">Domain은 외부 의존성 없음. Application은 Port에만 의존.</text>
</svg>
