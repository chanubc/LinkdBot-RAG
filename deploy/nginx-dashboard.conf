server {
    listen 80;
    server_name dashboard.chanu.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.chanu.shop;

    ssl_certificate /etc/letsencrypt/live/dashboard.chanu.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.chanu.shop/privkey.pem;

    location / {
        proxy_pass http://localhost:8501;
        proxy_http_version 1.1;

        # WebSocket support (Streamlit 필수)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}
